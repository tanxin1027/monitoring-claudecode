server:
  port: 8080

spring:
  application:
    name: hospital-monitor-server

  datasource:
    url: jdbc:mysql://localhost:3306/hospital_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    password: 123456
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.monitor.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: hospital-monitor-secret-key-2026
  expiration: 86400000
  header: Authorization
  prefix: Bearer

# 监控配置
monitor:
  # Agent 数据上报接口配置
  collector:
    # 是否启用认证
    enable-auth: true
    # 允许的 IP 白名单 (留空表示不限制)
    ip-whitelist:
    # 数据保留天数
    data-retention-days: 180

# 日志配置
logging:
  level:
    root: INFO
    com.monitor: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
